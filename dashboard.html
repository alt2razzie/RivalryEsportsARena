<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOS Hub - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0B1120; color: #F8FAFC;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
        }

        .wallet-container {
            background: #1E293B; padding: 40px; border-radius: 12px;
            border: 1px solid #EF4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.25);
            width: 350px; text-align: center; position: relative; overflow: hidden;
        }

        /* Subtle top border glow */
        .wallet-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, #EF4444, transparent);
        }

        .esports-red-glow { color: #EF4444; text-shadow: 0 0 10px #EF4444; font-weight: 900; margin-top: 0; letter-spacing: 2px;}

        .points-text { font-size: 3.5rem; font-weight: 900; display: block; margin-top: 15px; transition: color 0.3s; letter-spacing: -1px;}
        .php-text { font-size: 1.3rem; color: #10B981; font-weight: bold; } 
        
        .progress-wrapper { margin-top: 35px; text-align: left;}
        .progress-wrapper small { color: #94A3B8; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;}
        .progress-bar-bg { background: #0F172A; height: 14px; border-radius: 7px; overflow: hidden; margin-top: 8px; border: 1px solid #334155;}
        .progress-bar-fill { background: linear-gradient(90deg, #B91C1C, #EF4444); height: 100%; width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: inset 0 0 10px rgba(255,255,255,0.2);}
        
        .btn { padding: 16px; width: 100%; border: none; border-radius: 6px; font-weight: 900; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; }
        .btn-locked { background: #0F172A; color: #475569; cursor: not-allowed; border: 1px solid #334155;}
        .btn-unlocked { background: #EF4444; color: white; cursor: pointer; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); border: 1px solid #FCA5A5;}
        .btn-unlocked:hover { background: #DC2626; transform: translateY(-2px); }
        
        #systemMessage { margin-top: 10px; font-weight: bold; min-height: 24px; transition: opacity 0.5s; font-size: 0.9rem;}

        /* Top Navigation Menu */
        .nav-bar { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between;}
        .nav-link { color: #94A3B8; text-decoration: none; font-size: 0.85rem; font-weight: bold; transition: color 0.2s;}
        .nav-link:hover { color: #F8FAFC; }
    </style>
</head>
<body>

    <div class="nav-bar" style="position: absolute; top: 30px; width: 100%; max-width: 430px; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box;">
        <a href="/" class="nav-link">← Home</a>
        <a href="#" onclick="supabase.auth.signOut().then(() => window.location.href='/login.html')" class="nav-link">Sign Out</a>
    </div>

    <div class="wallet-container">
        <h2 class="esports-red-glow">IOS HUB WALLET</h2>
        <div id="systemMessage"></div>
        
        <span class="points-text"><span id="pointBalance">0.0</span> <span style="font-size: 1.5rem; color:#94A3B8;">Pts</span></span>
        <span class="php-text">≈ ₱<span id="phpBalance">0.00</span></span>

        <div class="progress-wrapper">
            <small>₱200 Cashback Threshold (50 Pts)</small>
            <div class="progress-bar-bg">
                <div id="cashbackProgress" class="progress-bar-fill"></div>
            </div>
        </div>

        <button id="claimCashbackBtn" class="btn btn-locked" disabled>Locked (Needs 50 Pts)</button>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const SUPABASE_URL = 'https://fzsrmnexarqlaawnhmw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6c3JtbmV4YXJxcmxhYXduaG13Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTc3NjAsImV4cCI6MjA5MTA3Mzc2MH0.VMN_srt8MBpQBq4F3SlTZJrnubrERF4RIGHG-Qe3dRQ';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const POINTS_REQUIRED = 50;
        const PHP_PER_POINT = 4;

        const msgDiv = document.getElementById('systemMessage');
        const pointBalanceEl = document.getElementById('pointBalance');
        const phpBalanceEl = document.getElementById('phpBalance');
        const progressEl = document.getElementById('cashbackProgress');
        const claimBtn = document.getElementById('claimCashbackBtn');

        async function initDashboard() {
            
            // --- AUTH CHECK ---
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                const urlParams = new URLSearchParams(window.location.search);
                const token = urlParams.get('token');
                window.location.href = token ? `/login.html?redirect=/dashboard.html?token=${token}` : '/login.html';
                return;
            }

            // --- TOKEN PROCESSING (QR SCAN) ---
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (token) {
                msgDiv.innerHTML = "Decrypting token securely...";
                msgDiv.style.color = "#FCD34D"; 

                // Execute the unhackable backend function
                const { data: pointsEarned, error } = await supabase.rpc('claim_reward_token', { p_token_id: token });

                if (error) {
                    msgDiv.innerHTML = "Error: Token invalid or already claimed.";
                    msgDiv.style.color = "#EF4444"; 
                } else {
                    msgDiv.innerHTML = `Success! +${pointsEarned.toFixed(1)} Points added.`;
                    msgDiv.style.color = "#10B981"; 
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
                setTimeout(() => { msgDiv.innerHTML = ""; }, 5000);
            }

            // --- INITIAL LOAD ---
            const { data: profile } = await supabase
                .from('user_profiles')
                .select('total_points')
                .eq('user_id', user.id)
                .single();

            if (profile) updateWalletUI(profile.total_points);

            // --- REAL-TIME WEBSOCKET LISTENER ---
            console.log("Establishing secure connection to IOS Hub Servers...");
            
            supabase
                .channel('custom-user-profile')
                .on('postgres_changes', {
                        event: 'UPDATE', 
                        schema: 'public',
                        table: 'user_profiles',
                        filter: `user_id=eq.${user.id}`
                    }, (payload) => {
                        const newPoints = payload.new.total_points;
                        
                        msgDiv.innerHTML = "🟢 Live Sync: Balance Updated!";
                        msgDiv.style.color = "#10B981";
                        
                        pointBalanceEl.parentElement.style.color = "#10B981";
                        setTimeout(() => { pointBalanceEl.parentElement.style.color = "#F8FAFC"; }, 1000);
                        
                        updateWalletUI(newPoints);
                        
                        setTimeout(() => { if(msgDiv.innerHTML.includes("Live Sync")) msgDiv.innerHTML = ""; }, 3000);
                    }
                ).subscribe();
        }

        // --- UI MATH & RENDERING ---
        function updateWalletUI(points) {
            const phpValue = points * PHP_PER_POINT;
            
            pointBalanceEl.innerText = points.toFixed(1);
            phpBalanceEl.innerText = phpValue.toFixed(2);

            let progress = (points / POINTS_REQUIRED) * 100;
            progressEl.style.width = `${Math.min(progress, 100)}%`;

            if (points >= POINTS_REQUIRED) {
                claimBtn.disabled = false;
                claimBtn.className = "btn btn-unlocked";
                claimBtn.innerText = "CLAIM ₱200 CASHBACK";
                claimBtn.onclick = () => alert("Cashback Claim Initiated!");
            } else {
                claimBtn.disabled = true;
                claimBtn.className = "btn btn-locked";
                claimBtn.innerText = `Locked (Needs ${POINTS_REQUIRED} Pts)`;
            }
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
